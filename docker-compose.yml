services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE:-ykt_propusk_db}
      DB_USER: ${DB_USER:-ykt_user}
      DB_PASS: ${DB_PASS}
    depends_on:
      - mysql
    networks:
      - ykt-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ykt_propusk_db}
      MYSQL_USER: ${MYSQL_USER:-ykt_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - ykt-network

volumes:
  mysql_data:

networks:
  ykt-network:
    driver: bridge
